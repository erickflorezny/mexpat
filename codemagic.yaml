workflows:
  mexpat-ios:
    name: Mexpat iOS Build & Distribute
    max_build_duration: 60
    integrations:
      # Must match the App Store Connect API key name in Codemagic Team Integrations.
      app_store_connect: codemagic
    environment:
      xcode: latest
      groups:
        # Attach your Codemagic variable group(s) here.
        # If your group has a different name, replace "Default" accordingly.
        - Default
      vars:
        XCODE_PROJECT: "Mexpat.xcodeproj"
        XCODE_SCHEME: "Mexpat"
        APP_BUNDLE_ID: "com.yourcompany.mexpat"
        SUPABASE_URL: "https://juyrhwdygiesqbuoujdh.supabase.co"
      # Configure these in Codemagic UI (Environment variables / groups):
      # SUPABASE_URL (plain text)
      # SUPABASE_ANON_KEY (secure)

    scripts:
      - name: Verify required environment variables
        script: |
          set -euo pipefail
          test -n "${SUPABASE_ANON_KEY:-}" || (echo "SUPABASE_ANON_KEY is missing (check variable name and attached env group)" && exit 1)

      - name: Generate CI xcconfig for runtime keys
        script: |
          set -euo pipefail
          mkdir -p Mexpat/Config
          cat > Mexpat/Config/Secrets.ci.xcconfig <<EOF
          // Generated by Codemagic at build time
          SUPABASE_URL = ${SUPABASE_URL}
          SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY}
          EOF
          echo "Generated Mexpat/Config/Secrets.ci.xcconfig"

      - name: Build IPA
        script: |
          set -euo pipefail
          xcode-project use-profiles
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
